spring.application.name=demo
server.servlet.context-path=/api/v1

# data base connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
logging.level.org.flywaydb=INFO

#update -> updates the schema
#create -> drop and recreate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
#check query counts to catch N+1 problem
spring.jpa.properties.hibernate.generate_statistics=true

#google cloud console
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT Configuration
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=86400000

# YouTube API Key
youtube.api.key=${YOUTUBE_API_KEY}

#swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

fastapi.token=${X_INTERNAL_TOKEN}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS}

replime.ingestion.max-retries=3
replime.ingestion.rabbitmq.exchange=replime.video.exchange
replime.ingestion.rabbitmq.queue=replime.video.index
replime.ingestion.rabbitmq.dlq=replime.video.index.dlq
replime.ingestion.rabbitmq.dlx=replime.video.dlx
replime.ingestion.rabbitmq.routing-key=video.index
replime.ingestion.rabbitmq.dlq-routing-key=video.dead
